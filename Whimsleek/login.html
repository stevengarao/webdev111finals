<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhimSleek | Access the Vault</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505; 
            --panel-bg: #080808; 
            --border-color: #222;
            --text-muted: #888888;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--black);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* VIDEO BACKGROUND */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(5, 5, 5, 0.6), rgba(5, 5, 5, 0.95));
            z-index: -1;
        }

        /* LOGIN CONTAINER */
        .login-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 60px 50px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: slideUp 1s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container h1 {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 2.2rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .login-container p {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* ROLE SELECTOR */
        .role-selector {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 30px;
        }

        .role-option {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: transparent;
            cursor: pointer;
        }

        .role-option.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        /* INPUT FIELDS */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .input-group input:focus {
            border-bottom: 1px solid var(--gold);
        }

        .input-group label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .login-btn:hover {
            background: var(--gold);
            color: #000;
        }

        /* DEMO ACCOUNTS PANEL (FIXED TO SIDE) */
        .demo-panel {
            position: fixed;
            left: 30px;
            bottom: 30px;
            background: rgba(8, 8, 8, 0.9);
            border: 1px solid var(--border-color);
            padding: 20px;
            width: 280px;
            z-index: 10;
            border-left: 3px solid var(--gold);
            backdrop-filter: blur(10px);
            animation: slideIn 1.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .demo-panel h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9rem;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .demo-acc {
            margin-bottom: 12px;
            font-size: 0.75rem;
        }

        .demo-acc:last-child { margin-bottom: 0; }

        .demo-acc span {
            display: block;
            color: var(--text-muted);
        }

        .demo-acc strong {
            color: #fff;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 2px;
        }

        #error-msg {
            color: #ff4c4c;
            font-size: 0.7rem;
            margin-top: 15px;
            text-transform: uppercase;
            display: none;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="bg-video">
        <source src="loginvid.mp4" type="video/mp4">
    </video>
    
    <div class="video-overlay"></div>

    <div class="demo-panel">
        <h3>Demo Access</h3>
        <div class="demo-acc">
            <strong>Super Admin</strong>
            <span>ID: super@whimsleek.com</span>
            <span>Key: super123</span>
        </div>
        <div class="demo-acc">
            <strong>Administrator</strong>
            <span>ID: admin@whimsleek.com</span>
            <span>Key: admin123</span>
        </div>
        <div class="demo-acc">
            <strong>Standard User</strong>
            <span>ID: user@whimsleek.com</span>
            <span>Key: user123</span>
        </div>
    </div>

    <div class="login-container">
        <h1>WhimSleek</h1>
        <p>Enter your credentials to access the vault</p>

        <div class="role-selector">
            <div class="role-option" onclick="selectRole(this)">Super Admin</div>
            <div class="role-option" onclick="selectRole(this)">Admin</div>
            <div class="role-option active" onclick="selectRole(this)">User</div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Identifier</label>
                <input type="text" id="identifier" placeholder="Email or Username" required>
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="securityKey" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submitBtn" class="login-btn">Secure Entry</button>
            <div id="error-msg">Access Denied: Invalid Credentials</div>
        </form>
    </div>

    <script>
        function selectRole(element) {
            document.querySelectorAll('.role-option').forEach(opt => {
                opt.classList.remove('active');
            });
            element.classList.add('active');
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const identifier = document.getElementById('identifier').value.trim();
            const key = document.getElementById('securityKey').value.trim();
            const activeRole = document.querySelector('.role-option.active').textContent.trim().toLowerCase();
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('submitBtn');

            let targetPage = "";
            let isValid = false;

            // Logic checking based on credentials in the demo panel
            if (activeRole === "super admin") {
                if(identifier === "super@whimsleek.com" && key === "super123") {
                    targetPage = "super-admin.html";
                    isValid = true;
                }
            } else if (activeRole === "admin") {
                if(identifier === "admin@whimsleek.com" && key === "admin123") {
                    targetPage = "admin.html";
                    isValid = true;
                }
            } else if (activeRole === "user") {
                if(identifier === "user@whimsleek.com" && key === "user123") {
                    targetPage = "index.html";
                    isValid = true;
                }
            }

            if (isValid) {
                errorMsg.style.display = "none";
                btn.innerHTML = "Authenticating...";
                btn.style.opacity = "0.7";
                btn.style.pointerEvents = "none";
                
                setTimeout(() => {
                    window.location.href = targetPage;
                }, 1500);
            } else {
                errorMsg.style.display = "block";
                // Shake effect for feedback
                document.querySelector('.login-container').style.animation = "none";
                setTimeout(() => {
                    document.querySelector('.login-container').style.animation = "slideUp 0.3s ease-out";
                }, 10);
            }
        }
    </script>
</body>
</html>
