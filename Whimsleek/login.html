<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhimSleek | Access the Vault</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505; 
            --panel-bg: #080808; 
            --border-color: #222;
            --text-muted: #888888;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--black);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* VIDEO BACKGROUND */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2; /* Pinaka-ilalim */
        }

        /* DARK LUXURY TINT SA IBABAW NG VIDEO */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(5, 5, 5, 0.6), rgba(5, 5, 5, 0.95));
            z-index: -1; /* Nasa pagitan ng video at ng form */
        }

        /* SHARP LUXURY CARD (No Glassmorphism) */
        .login-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 60px 50px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: slideUp 1s ease-out;
            position: relative;
            z-index: 1; /* Para laging nasa ibabaw ng video at overlay */
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container h1 {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .login-container p {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* ROLE SELECTOR STYLING - Sharp edges */
        .role-selector {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 30px;
        }

        .role-option {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: transparent;
            cursor: pointer; /* Added cursor pointer for better UX */
        }

        /* HIGHLIGHT FOR ACTIVE ROLE */
        .role-option.active {
            border-color: var(--gold);
            color: var(--gold);
        }

        .role-option:hover:not(.active) {
            border-color: #555;
            color: #fff;
        }

        /* INPUT FIELDS - Minimalist */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            transition: border 0.3s ease;
            outline: none;
            box-sizing: border-box; /* Ensures padding doesn't overflow width */
        }

        .input-group input:focus {
            border-bottom: 1px solid var(--gold);
        }

        .input-group label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
        }

        /* BUTTON LUXURY STYLE */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .login-btn:hover {
            letter-spacing: 4px;
            background: var(--gold);
            color: #000;
        }

        .forgot-pass {
            display: block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .forgot-pass:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="bg-video">
        <source src="loginvid.mp4" type="video/mp4">
    </video>
    
    <div class="video-overlay"></div>

    <div class="login-container">
        <h1>WhimSleek</h1>
        <p>Enter your credentials to access the vault</p>

        <div class="role-selector">
            <div class="role-option" onclick="selectRole(this)">Super Admin</div>
            <div class="role-option" onclick="selectRole(this)">Admin</div>
            <div class="role-option active" onclick="selectRole(this)">User</div>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Identifier</label>
                <input type="text" placeholder="Email or Username" required>
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Secure Entry</button>
        </form>

        <a href="#" class="forgot-pass">Forgotten credentials? Request access.</a>
    </div>

    <script>
        // Function para mag-highlight ng napiling role
        function selectRole(element) {
            document.querySelectorAll('.role-option').forEach(opt => {
                opt.classList.remove('active');
            });
            element.classList.add('active');
        }

        // Updated login function with dynamic redirection
        function handleLogin(event) {
            event.preventDefault();
            
            // Gumamit ng .textContent at .toLowerCase() para hindi ma-confuse sa CSS uppercase
            const activeRole = document.querySelector('.role-option.active').textContent.trim().toLowerCase();
            
            // I-set ang destination depende sa role
            let targetPage = "index.html"; // Default page
            
            if (activeRole === "super admin") {
                targetPage = "super-admin.html";
            } else if (activeRole === "admin") {
                targetPage = "admin.html";
            } else if (activeRole === "user") {
                targetPage = "index.html";
            }

            // Pa-wow effect muna bago mag redirect
            const btn = document.querySelector('.login-btn');
            btn.innerHTML = "Authenticating...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none"; // Disable button spam
            
            setTimeout(() => {
                window.location.href = targetPage; // Dito siya mapupunta based sa role
            }, 1500);
        }
    </script>
</body>
</html>
